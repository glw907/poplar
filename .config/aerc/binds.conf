#
# aerc keybindings — beautiful-aerc
#
# Keybindings map key sequences to aerc commands. Each [section] below
# corresponds to a different context in aerc — the bindings that are
# active depend on what you're doing (reading the message list, viewing
# a message, composing, etc.).
#
# Syntax: <key sequence> = <command>
# Use "Eq" for '=' in key sequences: "<Ctrl+Eq>"
# Wrap '#' in quotes to use as a key: "#" = quit
#
# For all options, see: `man aerc-binds`
#

# =====================================================================
# Global — active everywhere in aerc
# =====================================================================
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>
\[t = :prev-tab<Enter>
\]t = :next-tab<Enter>
<C-t> = :term<Enter>
? = :help keys<Enter>
<C-c> = :prompt 'Quit?' quit<Enter>
<C-q> = :prompt 'Quit?' quit<Enter>
<C-z> = :suspend<Enter>

# =====================================================================
# Message list — browsing your mailbox
# =====================================================================
# This is the main screen you see when aerc starts: folder sidebar on
# the left, message list on the right. Navigation is vim-style (j/k
# to move, g/G to jump to top/bottom) with page movement on Ctrl-d/u.
[messages]
q = :prompt 'Quit?' quit<Enter>

# --- Navigation ---
j = :next<Enter>
<Down> = :next<Enter>
<C-d> = :next 50%<Enter>
<C-f> = :next 100%<Enter>
<PgDn> = :next 100%<Enter>

k = :prev<Enter>
<Up> = :prev<Enter>
<C-u> = :prev 50%<Enter>
<C-b> = :prev 100%<Enter>
<PgUp> = :prev 100%<Enter>
g = :select 0<Enter>
G = :select -1<Enter>

# --- Folder navigation ---
# J/K move between folders in the sidebar.
# H/L collapse/expand folder trees.
J = :next-folder<Enter>
<C-Down> = :next-folder<Enter>
K = :prev-folder<Enter>
<C-Up> = :prev-folder<Enter>
H = :collapse-folder<Enter>
<C-Left> = :collapse-folder<Enter>
L = :expand-folder<Enter>
<C-Right> = :expand-folder<Enter>

# --- Selection ---
# v toggles selection on the current message (for batch operations).
# Space selects and moves to the next message — handy for selecting
# a run of messages quickly. V selects all visible messages.
v = :mark -t<Enter>
<Space> = :mark -t<Enter>:next<Enter>
V = :mark -v<Enter>

# --- Threading ---
# T toggles thread view on/off. The fold bindings (zc/zo/za) work
# like vim's code folding — collapse or expand individual threads.
# Tab is a quick toggle for the current thread.
T = :toggle-threads<Enter>
zc = :fold<Enter>
zo = :unfold<Enter>
za = :fold -t<Enter>
zM = :fold -a<Enter>
zR = :unfold -a<Enter>
<tab> = :fold -t<Enter>

# --- Actions ---
<Enter> = :view<Enter>
d = :prompt 'Really delete this message?' 'delete-message'<Enter>
D = :delete<Enter>
a = :archive flat<Enter>
A = :unmark -a<Enter>:mark -T<Enter>:archive flat<Enter>

# --- Compose ---
C = :compose<Enter>
m = :compose<Enter>

# --- Reply ---
# rr = reply-all (quoted)    rq = reply-all (no attribution line)
# Rr = reply to sender only  Rq = reply to sender (no attribution)
rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

c = :cf<space>
$ = :term<space>
! = :term<space>
| = :pipe<space>

# --- Search & filter ---
/ = :search<space>
\ = :filter<space>
n = :next-result<Enter>
N = :prev-result<Enter>
<Esc> = :clear<Enter>

# --- Split views ---
s = :split<Enter>
S = :vsplit<Enter>

# --- Fastmail integration (optional) ---
# These bindings create mail filter rules and manage masked email
# addresses directly from the message list. Uncomment to enable.
#
# Requires:
#   1. fastmail-cli binary installed (make install)
#   2. FASTMAIL_API_TOKEN environment variable set
#   3. A Fastmail account
#
# ff = create a filter rule from the sender (From header)
# fs = create a filter rule from the subject line
# ft = create a filter rule from the recipient (To header)
# md = delete the masked email address used in this message
#
# ff = :pipe -m fastmail-cli rules interactive from<Enter>
# fs = :pipe -m fastmail-cli rules interactive subject<Enter>
# ft = :pipe -m fastmail-cli rules interactive to<Enter>
# md = :pipe -m fastmail-cli masked delete<Enter>:delete<Enter>

# --- Patches (git-email) ---
# For working with git patches sent via email.
pl = :patch list<Enter>
pa = :patch apply <Tab>
pd = :patch drop <Tab>
pb = :patch rebase<Enter>
pt = :patch term<Enter>
ps = :patch switch <Tab>

[messages:folder=Drafts]
<Enter> = :recall<Enter>

# =====================================================================
# Message viewer — reading a single email
# =====================================================================
# When you press Enter on a message in the list, you enter the viewer.
# The email body is rendered through the mailrender filters (see the
# [filters] section in aerc.conf).
[view]
/ = :toggle-key-passthrough<Enter>/
q = :close<Enter>
O = :open<Enter>
o = :open<Enter>
S = :save<space>
| = :pipe<space>

# --- Save to corpus (optional, for development) ---
# Saves the raw email to the test corpus for filter development.
# Requires: aerc-save-email script on PATH.
# b = :pipe -m aerc-save-email<Enter>

# --- Triage workflow ---
# These bindings support a fast triage flow: process a message and
# immediately move to the next one, or close the viewer after acting.
#
# Lowercase stays in the viewer (shows next message after acting):
#   d = delete    a = archive
# Uppercase closes the viewer (returns to message list after acting):
#   D = delete    A = archive
d = :delete<Enter>
D = :close<Enter>:delete<Enter>
a = :archive flat<Enter>
A = :close<Enter>:archive flat<Enter>

# --- Links ---
# Links in rendered emails use OSC 8 hyperlinks — Ctrl+click to open
# in supporting terminals (kitty, WezTerm, foot, Alacritty, etc.).
# Ctrl-l lets you manually type a URL to open.
<C-l> = :open-link <space>

f = :forward<Enter>
rr = :reply -a<Enter>
rq = :reply -aq<Enter>
Rr = :reply<Enter>
Rq = :reply -q<Enter>

# --- Fastmail integration (optional) ---
# Same bindings as [messages] above. Uncomment to enable in the viewer.
# Capital F prefix here avoids conflict with 'f' for forward.
#
# Ff = :pipe -m fastmail-cli rules interactive from<Enter>
# Fs = :pipe -m fastmail-cli rules interactive subject<Enter>
# Ft = :pipe -m fastmail-cli rules interactive to<Enter>
# md = :pipe -m fastmail-cli masked delete<Enter>:delete<Enter>

H = :toggle-headers<Enter>
<C-k> = :prev-part<Enter>
<C-Up> = :prev-part<Enter>
<C-j> = :next-part<Enter>
<C-Down> = :next-part<Enter>
J = :next<Enter>
<C-Right> = :next<Enter>
K = :prev<Enter>
<C-Left> = :prev<Enter>

# --- Passthrough mode ---
# When key passthrough is on (toggled by / above), all keys go to the
# terminal pager instead of aerc. Ctrl-x returns to command mode,
# Escape exits passthrough.
[view::passthrough]
$noinherit = true
$ex = <C-x>
<Esc> = :toggle-key-passthrough<Enter>

# =====================================================================
# Compose — writing an email
# =====================================================================
# When you compose, reply, or forward, aerc opens a compose tab. The
# editor (nvim-mail) handles most interaction. These bindings control
# the aerc wrapper around the editor.
[compose]
$noinherit = true
$ex = <C-x>
$complete = <C-o>
<A-p> = :switch-account -p<Enter>
<C-Left> = :switch-account -p<Enter>
<A-n> = :switch-account -n<Enter>
<C-Right> = :switch-account -n<Enter>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>

[compose::editor]
$noinherit = true
$ex = <C-x>
<C-p> = :prev-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgDn> = :next-tab<Enter>

# --- Compose review screen ---
# After you exit the editor normally (<space>q or :wq in nvim-mail),
# aerc shows this review screen where you decide what to do.
#
# y = convert your markdown to HTML and send the message
# n = abort — discard the message cleanly
# v = preview — see what the message will look like
# p = postpone — save as a draft for later
# q = choose between discard or postpone
# e = re-edit — go back into nvim-mail
# a/d = attach or detach files
[compose::review]
y = :multipart text/html<Enter>:send<Enter>
n = :abort<Enter>
v = :preview<Enter>
p = :postpone<Enter>
q = :choose -o d discard abort -o p postpone postpone<Enter>
e = :edit<Enter>
a = :attach<space>
d = :detach<space>

[terminal]
$noinherit = true
$ex = <C-x>

<C-p> = :prev-tab<Enter>
<C-n> = :next-tab<Enter>
<C-PgUp> = :prev-tab<Enter>
<C-PgDn> = :next-tab<Enter>
