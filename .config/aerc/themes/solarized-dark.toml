name = "Solarized Dark"

[colors]
bg_base = "#002b36"
bg_elevated = "#073642"
bg_selection = "#073642"
bg_border = "#586e75"
fg_base = "#839496"
fg_bright = "#93a1a1"
fg_brightest = "#eee8d5"
fg_dim = "#657b83"
accent_primary = "#268bd2"
accent_secondary = "#2aa198"
accent_tertiary = "#2aa198"
color_error = "#dc322f"
color_warning = "#cb4b16"
color_success = "#859900"
color_info = "#b58900"
color_special = "#6c71c4"

[tokens]
heading = { color = "color_success", bold = true }
bold = { bold = true }
italic = { italic = true }
link_text = { color = "accent_secondary" }
