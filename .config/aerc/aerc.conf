#
# aerc main configuration
# https://github.com/glw907/beautiful-aerc
#
# Minimal config - only non-default values are set here.
# See aerc-config(5) for all options and defaults.

[general]

[ui]
# Message list columns (default layout, custom flags column)
index-columns=start>0,flags<2,name<22,subject<*,date>12,end>1
column-separator="  "
column-date={{.DateAutoFormat .Date.Local}}
column-start=
column-end=
column-flags={{.Flags | join ""}}
column-name={{.Peer | names | join ", "}}

# Sidebar and dirlist
sidebar-width=30
dirlist-tree=false
dirlist-left={{if eq .Folder "Inbox"}} ůįáį{{else if eq .Folder "Notifications"}} ůįāö{{else if eq .Folder "Drafts"}} ůįŹę{{else if eq .Folder "Sent"}} ůįĎö{{else if eq .Folder "Archive"}} ůįÄľ{{else if eq .Folder "Spam"}} ůįć∑{{else if eq .Folder "Trash"}} ůį©ļ{{else if eq .Folder "Remind"}} ůįĎī{{else}} ůį°°{{end}}  {{.Folder}}
dirlist-right= {{if .Unread}}{{humanReadable .Unread}} {{end}}

# Sort newest first by default
sort=-r date
threading-enabled=true

# Look and feel
# Set styleset-name to match your generated theme (e.g., nord, solarized-dark)
styleset-name=nord
border-char-vertical=‚Ēā
fuzzy-complete=true
mouse-enabled=true

# Tab titles
tab-title-account=Mail
tab-title-composer={{.Subject}}

# Status icons (Nerd Font)
icon-new=ůįáģ
icon-old=ůįáģ
icon-replied=ůįĎö
icon-forwarded=ůįíä
icon-flagged=ůįąĽ
icon-marked=ůįĄ¨
icon-draft=ůįŹę
icon-deleted=ůįÜī
icon-attachment=ůįŹĘ

# Thread display
thread-prefix-tip = "‚Äļ"
thread-prefix-indent = " "
thread-prefix-stem = "‚Ēā"
thread-prefix-limb = "‚ĒÄ"
thread-prefix-has-siblings = "‚Ēú‚ĒÄ"
thread-prefix-last-sibling = "‚ĒĒ‚ĒÄ"

[ui:folder=Inbox]
sort=date

[ui:folder=Notifications]
sort=date

[statusline]
column-left={{.StatusInfo}}

[viewer]
# Prefer HTML (better structure from marketing emails); fall back to plain text
alternatives=text/html,text/plain

# Custom header rendering via beautiful-aerc headers filter.
# header-layout is set to a nonexistent header (X-Collapse) so aerc
# hides its built-in header row, leaving only the filter output.
show-headers=true
header-layout=X-Collapse

[compose]
editor=nvim-mail
edit-headers=true
address-book-cmd=khard email --parsable --remove-first-line %s
empty-subject-warning=true
no-attachment-warning=^[^>]*attach
format-flowed=true

[multipart-converters]
text/html=pandoc -f markdown -t html --standalone

[filters]
text/plain=beautiful-aerc plain
text/html=beautiful-aerc html
application/zip=echo "ZIP archive - use :open or :save to download"
application/pdf=echo "PDF document - use :open or :save to download"
application/*=echo "Binary attachment - use :open or :save to download"
text/calendar=calendar
message/delivery-status=colorize
message/rfc822=colorize
.headers=beautiful-aerc headers

[openers]

[templates]
