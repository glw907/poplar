#
# aerc main configuration â€” beautiful-aerc
#
# This config works out of the box with the beautiful-aerc filter suite.
# Only non-default values are set here. For all available options and
# their defaults, see the aerc-config(5) man page: `man aerc-config`
#

[ui]
# --- Message list columns ---
# The message list is the main view: one row per email. These settings
# control what columns appear and how wide they are.
#
# Layout: [padding] [flags] [sender] [subject] [date] [padding]
# The start/end columns add 1-char padding at the edges for breathing
# room. The subject column (<*) fills all remaining space.
index-columns=start>0,flags<2,name<22,subject<*,date>12,end>1
column-separator="  "
column-date={{.DateAutoFormat .Date.Local}}
column-start=
column-end=
column-flags={{.Flags | join ""}}
column-name={{.Peer | names | join ", "}}

# --- Sidebar ---
# The sidebar shows your mailbox folders on the left side of the screen.
# dirlist-tree=false keeps the list flat â€” aerc's tree mode sorts
# children alphabetically and ignores your preferred folder order.
sidebar-width=30
dirlist-tree=false

# Folder icons use Nerd Font symbols. If you don't have a Nerd Font
# installed, you'll see placeholder squares â€” either install one
# (https://www.nerdfonts.com/) or remove the icon template below.
dirlist-left={{if eq .Folder "Inbox"}} َ°‡°{{else if eq .Folder "Notifications"}} َ°‚ڑ{{else if eq .Folder "Drafts"}} َ°ڈ«{{else if eq .Folder "Sent"}} َ°‘ڑ{{else if eq .Folder "Archive"}} َ°€¼{{else if eq .Folder "Spam"}} َ°چ·{{else if eq .Folder "Trash"}} َ°©؛{{else if eq .Folder "Remind"}} َ°‘´{{else}} َ°،،{{end}}  {{.Folder}}
dirlist-right= {{if .Unread}}{{humanReadable .Unread}} {{end}}

# --- Sort & threading ---
# Default: newest first. Inbox and Notifications override this below
# to oldest first, so conversations read chronologically in your
# primary folders.
sort=-r date
threading-enabled=true

# --- Appearance ---
# styleset-name must match a theme filename in themes/ (without .toml).
# After changing themes, regenerate the styleset and restart aerc:
#   mailrender themes generate
styleset-name=nord
border-char-vertical=â”‚
fuzzy-complete=true
mouse-enabled=true

# --- Tabs ---
# tab-title-composer shows only the subject line. The default includes
# "to:recipient" which wastes tab bar space when you have multiple tabs.
tab-title-account=Mail
tab-title-composer={{.Subject}}

# --- Status icons (Nerd Font Material Design) ---
# These appear in the flags column of the message list, to the left
# of the sender name. Requires a Nerd Font (see sidebar note above).
icon-new=َ°‡®
icon-old=َ°‡®
icon-replied=َ°‘ڑ
icon-forwarded=َ°’ٹ
icon-flagged=َ°ˆ»
icon-marked=َ°„¬
icon-draft=َ°ڈ«
icon-deleted=َ°†´
icon-attachment=َ°ڈ¢

# --- Thread display ---
# Box-drawing characters for clean thread visualization in the message
# list. These create a tree structure connecting related messages.
thread-prefix-tip = "â€؛"
thread-prefix-indent = " "
thread-prefix-stem = "â”‚"
thread-prefix-limb = "â”€"
thread-prefix-has-siblings = "â”œâ”€"
thread-prefix-last-sibling = "â””â”€"

# --- Per-folder sort overrides ---
# Inbox and Notifications use oldest-first so conversations read
# chronologically â€” you see the oldest unread message at the top.
[ui:folder=Inbox]
sort=date

[ui:folder=Notifications]
sort=date

[statusline]
column-left={{.StatusInfo}}

[viewer]
# --- MIME part preference ---
# When an email has both HTML and plain text parts, prefer HTML.
# Marketing emails and newsletters have better structure (paragraphs,
# headings, lists) in their HTML part. Their plain text parts are
# often a wall of text with no formatting at all.
alternatives=text/html,text/plain

# --- Custom header rendering ---
# beautiful-aerc replaces aerc's built-in header display with the
# mailrender headers filter. This gives us colored field names,
# address wrapping, and a consistent layout.
#
# How it works: show-headers=true tells aerc to pipe raw headers
# through the .headers filter below. header-layout=X-Collapse is a
# trick â€” it tells aerc to only show the "X-Collapse" header in its
# built-in header area, but no email has that header, so the area
# collapses to nothing. Only the filter output is shown.
show-headers=true
header-layout=X-Collapse

[compose]
# nvim-mail is a dedicated Neovim profile for composing email.
# It's isolated from your regular Neovim config â€” see docs/nvim-mail.md.
editor=nvim-mail

# edit-headers=true means header fields (To, Cc, Subject, etc.) appear
# as editable text at the top of the compose buffer, rather than in a
# separate aerc prompt. nvim-mail reformats them for readability.
edit-headers=true

# Contact completion: press Ctrl-o in header fields to search contacts.
# Requires khard (https://github.com/lucc/khard) with contacts synced
# via vdirsyncer. If you don't use khard, remove or comment this out.
address-book-cmd=khard email --parsable --remove-first-line %s

empty-subject-warning=true

# Warn if the message body mentions "attach" (not in quoted text) but
# has no attachments. The ^[^>]* prefix skips quoted lines.
no-attachment-warning=^[^>]*attach

# format-flowed (RFC 3676): the editor hard-wraps at 72 characters,
# and aerc adds reflow markers on send. Recipients' email clients can
# then reflow the text to fit their display width, rather than seeing
# rigid 72-character lines. This is the standard for polite plain text
# email.
format-flowed=true

[multipart-converters]
# When you press 'y' in the compose review screen, aerc converts your
# markdown body to HTML using mailrender, then sends both versions as a
# multipart message. Recipients see rich text in GUI clients and clean
# plain text in CLI clients.
text/html=mailrender to-html

[filters]
# Filters map MIME types to commands. Each filter receives the message
# part on stdin and writes styled text to stdout. mailrender is the
# beautiful-aerc filter binary â€” see the README for what each
# subcommand does, or docs/power-users.md for the full pipeline.
text/plain=mailrender plain
text/html=mailrender html

# Binary attachments can't be displayed inline. These filters show
# a helpful message instead of the "no filter configured" error.
application/zip=echo "ZIP archive - use :open or :save to download"
application/pdf=echo "PDF document - use :open or :save to download"
application/*=echo "Binary attachment - use :open or :save to download"

# Built-in aerc filters for calendar invites and delivery status.
text/calendar=calendar
message/delivery-status=colorize
message/rfc822=colorize

# .headers is a special filter that runs on the raw RFC 2822 headers
# of every message. mailrender headers reformats and colorizes them.
# See the [viewer] section above for how the built-in header area
# is suppressed in favor of this filter's output.
.headers=mailrender headers

