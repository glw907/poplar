# Mail terminal profile
# Launch with: kitty --config ~/.config/kitty/kitty-mail.conf --title Mail aerc

# -- Font --
font_family      postscript_name=iAWriterMonoS-Regular
bold_font        postscript_name=iAWriterMonoS-Bold
italic_font      postscript_name=iAWriterMonoS-Italic
bold_italic_font postscript_name=iAWriterMonoS-BoldItalic
font_size        11.5

# Nerd Font symbol fallback
symbol_map U+E000-U+F8FF   JetBrainsMonoNL Nerd Font
symbol_map U+F0000-U+FFFFF JetBrainsMonoNL Nerd Font
symbol_map U+100000-U+10FFFF JetBrainsMonoNL Nerd Font

# -- Window --
background           #2e3440
background_opacity   1.0
window_padding_width 15 30 15 30
remember_window_size no
initial_window_width  140c
initial_window_height 48c

# -- Chrome --
tab_bar_min_tabs     999
enabled_layouts      stack

# -- Shell integration --
shell_integration enabled
copy_on_select          yes
strip_trailing_spaces   smart

# -- Scrollback --
scrollback_lines 10000

# -- Colors - Nord --
foreground            #d8dee9
cursor                #88c0d0
cursor_blink_interval 0
cursor_shape          block
cursor_shape_unfocused unchanged
selection_background  #4c566a

color0   #3b4252
color1   #bf616a
color2   #a3be8c
color3   #ebcb8b
color4   #81a1c1
color5   #b48ead
color6   #88c0d0
color7   #e5e9f0
color8   #4c566a
color9   #bf616a
color10  #a3be8c
color11  #ebcb8b
color12  #81a1c1
color13  #b48ead
color14  #8fbcbb
color15  #eceff4
