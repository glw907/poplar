# kitty-mail.conf — Dedicated terminal profile for email
#
# This is an example of how you can customize your terminal emulator
# for a CLI email client. The mail launcher script uses this profile:
#
#   kitty --config ~/.config/kitty/kitty-mail.conf --title Mail aerc
#
# Design choices:
#   - Prose-optimized font (iA Writer Mono) for comfortable reading
#   - Generous padding so email doesn't feel cramped against the edges
#   - Nord color scheme matching the aerc theme
#   - Hidden tab bar (aerc has its own tab system)
#   - Fixed window size for consistent column layout
#
# This file is specific to kitty (https://sw.kovidgoyal.net/kitty/).
# If you use a different terminal emulator, adapt these ideas to your
# own config format — the principles (readable font, generous padding,
# matching colors, fixed size) apply to any terminal.

# -- Font --
# iA Writer Mono is designed for long-form reading and writing. You can
# use any font you prefer here. If your font doesn't include Nerd Font
# symbols (used for folder icons and message flags in aerc), the
# symbol_map lines below pull those glyphs from a Nerd Font as a
# fallback.
font_family      postscript_name=iAWriterMonoS-Regular
bold_font        postscript_name=iAWriterMonoS-Bold
italic_font      postscript_name=iAWriterMonoS-Italic
bold_italic_font postscript_name=iAWriterMonoS-BoldItalic
font_size        11.5

# Nerd Font symbol fallback — only needed if your primary font doesn't
# include Nerd Font glyphs. Download a Nerd Font at nerdfonts.com.
symbol_map U+E000-U+F8FF   JetBrainsMonoNL Nerd Font
symbol_map U+F0000-U+FFFFF JetBrainsMonoNL Nerd Font
symbol_map U+100000-U+10FFFF JetBrainsMonoNL Nerd Font

# -- Window --
# Generous padding makes email feel less like staring at a code
# terminal. The fixed window size (140 columns x 48 rows) gives
# mailrender a consistent width for text wrapping and link truncation.
background           #2e3440
background_opacity   1.0
window_padding_width 15 30 15 30
remember_window_size no
initial_window_width  140c
initial_window_height 48c

# -- Chrome --
# Hide kitty's tab bar — aerc manages its own tabs, and showing both
# tab bars would be confusing. The stack layout means only one pane
# is visible at a time.
tab_bar_min_tabs     999
enabled_layouts      stack

# -- Shell integration --
shell_integration enabled
copy_on_select          yes
strip_trailing_spaces   smart

# -- Scrollback --
scrollback_lines 10000

# -- Colors: Nord --
# These match the Nord theme in .config/aerc/themes/nord.toml. If you
# switch aerc themes, update these colors to match — see docs/themes.md
# for details on keeping your terminal and aerc colors in sync.
foreground            #d8dee9
cursor                #88c0d0
cursor_blink_interval 0
cursor_shape          block
cursor_shape_unfocused unchanged
selection_background  #4c566a

color0   #3b4252
color1   #bf616a
color2   #a3be8c
color3   #ebcb8b
color4   #81a1c1
color5   #b48ead
color6   #88c0d0
color7   #e5e9f0
color8   #4c566a
color9   #bf616a
color10  #a3be8c
color11  #ebcb8b
color12  #81a1c1
color13  #b48ead
color14  #8fbcbb
color15  #eceff4
